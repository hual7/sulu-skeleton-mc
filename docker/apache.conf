# Enabled as the default site on the Debian php:apache image
# (/etc/apache2/sites-available/000-default.conf). PHP runs in-process
# via mod_php — no proxying to FPM. rewrite/headers are enabled in the
# Dockerfile via a2enmod.
ServerName localhost

<VirtualHost *:80>
    DocumentRoot /var/www/html/public
    DirectoryIndex index.php

    <Directory /var/www/html/public>
        AllowOverride None
        Require all granted
        FallbackResource /index.php
    </Directory>

    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
