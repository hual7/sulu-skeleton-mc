# Dropped into /etc/apache2/conf.d/ on Alpine. Apache only serves
# static files; every PHP request is proxied to PHP-FPM in the same
# container. The guards keep this file independent of which modules
# the base httpd.conf already loads.
<IfModule !proxy_module>
    LoadModule proxy_module modules/mod_proxy.so
</IfModule>
<IfModule !proxy_fcgi_module>
    LoadModule proxy_fcgi_module modules/mod_proxy_fcgi.so
</IfModule>
<IfModule !headers_module>
    LoadModule headers_module modules/mod_headers.so
</IfModule>

ServerName localhost

<VirtualHost *:80>
    DocumentRoot /var/www/html/public
    DirectoryIndex index.php

    <Directory /var/www/html/public>
        AllowOverride None
        Require all granted
        FallbackResource /index.php
    </Directory>

    # index.php is the only PHP script that exists in public/ — hand
    # it to FPM; everything else is served by Apache directly.
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://127.0.0.1:9000"
    </FilesMatch>

    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
