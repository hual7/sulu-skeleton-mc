name: Build and Deploy to Magic Containers
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      # The secrets context is not available in step-level `if`, so mirror
      # the key into env to make the deploy step conditional on it.
      BUNNYNET_API_KEY: ${{ secrets.BUNNYNET_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Dedicated BuildKit builder: pushes layers straight from the
      # builder to the registry (more reliable against ghcr.io
      # "unknown blob" errors than the docker-engine push path) and
      # enables the GitHub Actions layer cache.
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy to Magic Containers
        # Only deploy once the repo is wired up to a Magic Containers app
        # (APP_ID variable + BUNNYNET_API_KEY secret in the repo settings).
        if: ${{ vars.APP_ID != '' && env.BUNNYNET_API_KEY != '' }}
        uses: BunnyWay/actions/container-update-image@main
        with:
          app_id: ${{ vars.APP_ID }}
          api_key: ${{ secrets.BUNNYNET_API_KEY }}
          container: app
          image_tag: ${{ github.sha }}
